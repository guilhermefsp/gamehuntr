name: Daily Price Export

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      ludopedia_top:
        description: "How many top-ranked Ludopedia games to include"
        default: "1000"
      concurrency:
        description: "Concurrent game refreshes"
        default: "4"

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Install Scrapling/Playwright browser
        run: |
          uv run scrapling install
          uv run playwright install --with-deps chromium

      - name: Run price export
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          LUDOPEDIA_ACCESS_TOKEN: ${{ secrets.LUDOPEDIA_ACCESS_TOKEN }}
          BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}
          BGG_USERNAME: ${{ secrets.BGG_USERNAME }}
          BGG_PASSWORD: ${{ secrets.BGG_PASSWORD }}
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
          AMAZON_CREDENTIAL_VERSION: ${{ secrets.AMAZON_CREDENTIAL_VERSION }}
          WISHLIST_URL: ${{ secrets.WISHLIST_URL }}
        run: >
          uv run python scripts/export_prices.py
          --ludopedia-top "${{ github.event.inputs.ludopedia_top || '1000' }}"
          --concurrency "${{ github.event.inputs.concurrency || '4' }}"
